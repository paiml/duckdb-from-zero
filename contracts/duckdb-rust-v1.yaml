metadata:
  version: 1.0.0
  created: '2026-05-05'
  author: 'PAIML Engineering'
  description: |
    Provable contracts for the duckdb-reports crate of paiml/duckdb-from-zero
    (Coursera "DuckDB from Zero" course companion). Five named runtime
    invariants enforced inside each of the three reports (top_customers,
    top_films, top_actors) after a successful query against the Pagila
    Parquet fixtures. Each contract is asserted at runtime in
    crates/duckdb-reports/src/lib.rs and proved by both the negative-path
    tests in `mod tests` and the positive-path integration tests against
    real Sakila data.
  references:
    - 'duckdb-from-zero README §Provable contracts'
    - 'paiml/mysql-from-zero contracts/mysql-rust-v1.yaml — sibling spec'
    - 'sql/pagila-analytics/*.sql — the queries the binary executes'

equations:
  row_count_exact:
    formula: 'len(rows) == limit'
    domain: 'rows ∈ Vec<T>, limit ∈ u32'
    codomain: 'bool'
    lean_theorem: Theorems.DuckdbReports.RowCountExact
    postconditions:
    - 'rows.len() == limit'

  top_record_has_count:
    formula: 'rows[0].count_field >= 1'
    domain: 'rows ∈ Vec<T>, rows non-empty'
    codomain: 'bool'
    lean_theorem: Theorems.DuckdbReports.TopRecordHasCount
    postconditions:
    - 'rows[0].rental_count >= 1  (customers, films)'
    - 'rows[0].film_count   >= 1  (actors)'

  id_positive:
    formula: 'forall r in rows. r.id > 0'
    domain: 'rows ∈ Vec<T>'
    codomain: 'bool'
    lean_theorem: Theorems.DuckdbReports.IdPositive
    postconditions:
    - 'all rows have customer_id > 0  (customers)'
    - 'all rows have film_id > 0      (films)'
    - 'all rows have actor_id > 0     (actors)'

  string_field_well_formed:
    formula: 'forall r in rows. text_invariant(r)'
    domain: 'rows ∈ Vec<T>'
    codomain: 'bool'
    lean_theorem: Theorems.DuckdbReports.StringFieldWellFormed
    postconditions:
    - 'name contains a space          (customers — "First Last")'
    - 'title is non-empty             (films)'
    - 'first_name + last_name non-empty (actors)'

  count_descending:
    formula: 'forall i in 0..len(rows)-1. rows[i].count >= rows[i+1].count'
    domain: 'rows ∈ Vec<T>, ordered by query'
    codomain: 'bool'
    lean_theorem: Theorems.DuckdbReports.CountDescending
    postconditions:
    - 'rental_count is monotonically non-increasing (customers, films)'
    - 'film_count   is monotonically non-increasing (actors)'

proof_obligations:
  # C1 row_count_exact ─────────────────────────────────
  - type: postcondition
    property: 'Row count matches the requested limit (customers)'
    formal: 'len(rows) == limit'
    applies_to: top_customers
  - type: postcondition
    property: 'Row count matches the requested limit (films)'
    formal: 'len(rows) == limit'
    applies_to: top_films
  - type: postcondition
    property: 'Row count matches the requested limit (actors)'
    formal: 'len(rows) == limit'
    applies_to: top_actors
  # C2 top_record_has_count ────────────────────────────
  - type: postcondition
    property: 'Top customer has at least one rental'
    formal: 'rows[0].rental_count >= 1'
    applies_to: top_customers
  - type: postcondition
    property: 'Top film has at least one rental'
    formal: 'rows[0].rental_count >= 1'
    applies_to: top_films
  - type: postcondition
    property: 'Top actor has at least one film'
    formal: 'rows[0].film_count >= 1'
    applies_to: top_actors
  # C3 id_positive ─────────────────────────────────────
  - type: invariant
    property: 'All customer_ids are positive'
    formal: 'forall r in rows. r.customer_id > 0'
    applies_to: top_customers
  - type: invariant
    property: 'All film_ids are positive'
    formal: 'forall r in rows. r.film_id > 0'
    applies_to: top_films
  - type: invariant
    property: 'All actor_ids are positive'
    formal: 'forall r in rows. r.actor_id > 0'
    applies_to: top_actors
  # C4 string_field_well_formed ────────────────────────
  - type: invariant
    property: 'Customer names are space-separated First Last'
    formal: "forall r in rows. r.name.contains(' ')"
    applies_to: top_customers
  - type: invariant
    property: 'Film titles are non-empty'
    formal: 'forall r in rows. !r.title.is_empty()'
    applies_to: top_films
  - type: invariant
    property: 'Actor first_name and last_name are non-empty'
    formal: 'forall r in rows. !r.first_name.is_empty() && !r.last_name.is_empty()'
    applies_to: top_actors
  # C5 count_descending ────────────────────────────────
  - type: invariant
    property: 'Customers sorted by rental_count descending'
    formal: 'forall i. rows[i].rental_count >= rows[i+1].rental_count'
    applies_to: top_customers
  - type: invariant
    property: 'Films sorted by rental_count descending'
    formal: 'forall i. rows[i].rental_count >= rows[i+1].rental_count'
    applies_to: top_films
  - type: invariant
    property: 'Actors sorted by film_count descending'
    formal: 'forall i. rows[i].film_count >= rows[i+1].film_count'
    applies_to: top_actors

enforcement:
  row_count_exact:
    description: 'LIMIT N in the SQL must return exactly N rows on the Pagila Parquet fixtures.'
    check: 'C1 assert_eq!(rows.len(), limit) inside each assert_contracts_*'
    severity: 'ERROR'

  top_record_has_count:
    description: 'Top record must have ≥1 count — sentinel that the LEFT JOIN actually matched.'
    check: 'C2 assert!(rows[0].rental_count or .film_count >= 1)'
    severity: 'ERROR'

  id_positive:
    description: 'AUTO_INCREMENT ids start at 1 in Sakila/Pagila; zero or negative is data corruption.'
    check: 'C3 loop assertion on every row.id'
    severity: 'ERROR'

  string_field_well_formed:
    description: 'Names/titles must be well-formed: customer names are "First Last", film titles non-empty, actor names non-empty in both fields.'
    check: 'C4 loop assertion on every row text field'
    severity: 'ERROR'

  count_descending:
    description: 'ORDER BY count DESC must hold; reversed or unsorted output is a query bug.'
    check: 'C5 pairwise assertion across the result vector'
    severity: 'ERROR'

falsification_tests:
  # C1 row_count_exact — one falsification per report ─────
  - id: FALSIFY-DUCKDB-001-C
    rule: 'Customer row count matches limit'
    prediction: 'top_customers(conn, N) returns exactly N rows on the Pagila fixture.'
    test: 'mod tests::customers_contract_c1_violation forces a panic when len != limit.'
    if_fails: 'LIMIT clause dropped from sql/pagila-analytics/top-customers.sql.'
  - id: FALSIFY-DUCKDB-001-F
    rule: 'Film row count matches limit'
    prediction: 'top_films(conn, N) returns exactly N rows on the Pagila fixture.'
    test: 'mod tests::films_contract_c1_violation forces a panic when len != limit.'
    if_fails: 'LIMIT clause dropped from top_films_in SQL.'
  - id: FALSIFY-DUCKDB-001-A
    rule: 'Actor row count matches limit'
    prediction: 'top_actors(conn, N) returns exactly N rows on the Pagila fixture.'
    test: 'mod tests::actors_contract_c1_violation forces a panic when len != limit.'
    if_fails: 'LIMIT clause dropped from top_actors_in SQL.'

  # C2 top_record_has_count ──────────────────────────────
  - id: FALSIFY-DUCKDB-002-C
    rule: 'Top customer has ≥1 rental'
    prediction: 'rows[0].rental_count >= 1 for any non-empty Pagila fixture.'
    test: 'mod tests::customers_contract_c2_violation; integration::customers_report_matches_contracts.'
    if_fails: 'LEFT JOIN customer→rental matches zero — wrong join key or empty rental table.'
  - id: FALSIFY-DUCKDB-002-F
    rule: 'Top film has ≥1 rental'
    prediction: 'rows[0].rental_count >= 1 for any non-empty Pagila fixture.'
    test: 'mod tests::films_contract_c2_violation; integration::films_report_matches_contracts.'
    if_fails: 'film→inventory→rental chain is broken.'
  - id: FALSIFY-DUCKDB-002-A
    rule: 'Top actor has ≥1 film'
    prediction: 'rows[0].film_count >= 1 for any non-empty Pagila fixture.'
    test: 'mod tests::actors_contract_c2_violation; integration::actors_report_matches_contracts.'
    if_fails: 'film_actor table empty or join predicate wrong.'

  # C3 id_positive ───────────────────────────────────────
  - id: FALSIFY-DUCKDB-003-C
    rule: 'All customer_ids are positive'
    prediction: 'Sakila customer.customer_id starts at 1 (AUTO_INCREMENT).'
    test: 'mod tests::customers_contract_c3_violation forces panic on customer_id=0.'
    if_fails: 'Data corruption — fetch-data.sh emitted bad TSV or the parquet file was altered.'
  - id: FALSIFY-DUCKDB-003-F
    rule: 'All film_ids are positive'
    prediction: 'Sakila film.film_id starts at 1 (AUTO_INCREMENT).'
    test: 'mod tests::films_contract_c3_violation forces panic on film_id=0.'
    if_fails: 'Data corruption in fetch-data.sh extraction.'
  - id: FALSIFY-DUCKDB-003-A
    rule: 'All actor_ids are positive'
    prediction: 'Sakila actor.actor_id starts at 1 (AUTO_INCREMENT).'
    test: 'mod tests::actors_contract_c3_violation forces panic on actor_id=0.'
    if_fails: 'Data corruption in fetch-data.sh extraction.'

  # C4 string_field_well_formed ──────────────────────────
  - id: FALSIFY-DUCKDB-004-C
    rule: 'Customer name is "First Last"'
    prediction: 'Sakila customer first_name and last_name are both populated; concat with space yields a name with a space.'
    test: "mod tests::customers_contract_c4_violation forces panic when name lacks a space."
    if_fails: 'first_name or last_name was NULL → concat returns a single-token name → contract trips.'
  - id: FALSIFY-DUCKDB-004-F
    rule: 'Film title is non-empty'
    prediction: 'Sakila film.title is NOT NULL and non-empty for all rows.'
    test: 'mod tests::films_contract_c4_violation forces panic on empty title.'
    if_fails: 'film row with empty title in the fixture — data corruption.'
  - id: FALSIFY-DUCKDB-004-A
    rule: 'Actor names are non-empty'
    prediction: 'Sakila actor.first_name and actor.last_name are NOT NULL and non-empty.'
    test: 'mod tests::actors_contract_c4_violation forces panic on empty first_name.'
    if_fails: 'actor row with empty name field — data corruption.'

  # C5 count_descending ──────────────────────────────────
  - id: FALSIFY-DUCKDB-005-C
    rule: 'Customers sorted by rental_count DESC'
    prediction: 'rows[i].rental_count >= rows[i+1].rental_count holds pairwise.'
    test: 'mod tests::customers_contract_c5_violation forces panic on ascending pair.'
    if_fails: 'ORDER BY clause removed or flipped to ASC.'
  - id: FALSIFY-DUCKDB-005-F
    rule: 'Films sorted by rental_count DESC'
    prediction: 'rows[i].rental_count >= rows[i+1].rental_count holds pairwise.'
    test: 'mod tests::films_contract_c5_violation forces panic on ascending pair.'
    if_fails: 'ORDER BY clause removed or flipped to ASC.'
  - id: FALSIFY-DUCKDB-005-A
    rule: 'Actors sorted by film_count DESC'
    prediction: 'rows[i].film_count >= rows[i+1].film_count holds pairwise.'
    test: 'mod tests::actors_contract_c5_violation forces panic on ascending pair.'
    if_fails: 'ORDER BY clause removed or flipped to ASC.'

qa_gate:
  id: F-DUCKDB-001
  name: 'DuckDB Reports Contract'
  description: 'Five runtime invariants asserted in each top_*() function after the typed DuckDB query against Pagila Parquets.'
  checks:
    - 'row_count_exact'
    - 'top_record_has_count'
    - 'id_positive'
    - 'string_field_well_formed'
    - 'count_descending'
  pass_criteria: 'All five falsification tests pass and runtime asserts never fire on the canonical Pagila fixture; negative-path unit tests in mod tests verify each assertion fires when its precondition is violated.'

kani_harnesses:
  - id: KANI-DUCKDB-001
    obligation: 'Row count matches limit'
    property: 'len(rows) == limit for any Pagila fixture with >= limit records'
    bound: 4
    strategy: exhaustive
    harness: verify_row_count_exact
  - id: KANI-DUCKDB-002
    obligation: 'Top record has at least one count'
    property: 'rows[0].count >= 1 when rows is non-empty'
    bound: 4
    strategy: exhaustive
    harness: verify_top_record_has_count
  - id: KANI-DUCKDB-003
    obligation: 'All ids are positive'
    property: 'forall r in rows. r.id > 0'
    bound: 4
    strategy: exhaustive
    harness: verify_id_positive
  - id: KANI-DUCKDB-004
    obligation: 'String fields are well-formed'
    property: 'forall r in rows. text_invariant(r)'
    bound: 4
    strategy: exhaustive
    harness: verify_string_field_well_formed
  - id: KANI-DUCKDB-005
    obligation: 'Result is sorted by count descending'
    property: 'forall i. rows[i].count >= rows[i+1].count'
    bound: 4
    strategy: exhaustive
    harness: verify_count_descending
